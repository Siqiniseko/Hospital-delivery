services:
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]
  backend:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports: ["5000:5000"]
    volumes: ["./backend:/app"]
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/hospital_delivery_level3
      JWT_SECRET: change_this_in_production
      CLIENT_URL: http://localhost:3000
    depends_on: [mongo]
  frontend:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports: ["3000:5173"]
    volumes: ["./frontend:/app"]
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on: [backend]
volumes:
  mongo_data:
